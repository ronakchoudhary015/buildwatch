<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Project Update — Buildwatch</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0E0D0A;--surface:#1A1916;--surface2:#242220;--border:#2E2C28;--text:#F0EDE6;--text2:#9B9890;--text3:#6B6860;--amber:#F5A623;--amber-bg:rgba(245,166,35,0.08);--amber-border:rgba(245,166,35,0.2);--green:#2DB87A;--green-bg:rgba(45,184,122,0.08);--green-border:rgba(45,184,122,0.25);--red:#E05A4A;--radius:12px;}
html{-webkit-font-smoothing:antialiased;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding-bottom:40px;}
.nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.nav-logo{font-weight:700;font-size:15px;}
.nav-logo span{color:var(--amber);}
.nav-badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:100px;background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border);}
.content{padding:16px;max-width:680px;margin:0 auto;}
.project-hero{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;}
.project-name{font-size:22px;font-weight:700;letter-spacing:-0.5px;margin-bottom:4px;}
.project-meta{font-size:13px;color:var(--text2);margin-bottom:16px;}
.progress-wrap{margin-top:8px;}
.progress-label{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:6px;}
.progress-bar{height:10px;background:var(--border);border-radius:5px;overflow:hidden;}
.progress-fill{height:10px;border-radius:5px;background:var(--amber);transition:width .5s ease;}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.mc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 10px;text-align:center;}
.mc-val{font-size:22px;font-weight:700;color:var(--amber);}
.mc-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-top:3px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
.card-title{font-size:13px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:7px;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;}
.card-title .cdot{width:5px;height:5px;border-radius:50%;background:var(--amber);flex-shrink:0;}
.tag{display:inline-flex;font-size:10px;font-weight:600;padding:3px 8px;border-radius:100px;text-transform:uppercase;}
.tag-ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border);}
.tag-warn{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border);}
.tag-bad{background:rgba(224,90,74,0.08);color:#E05A4A;border:1px solid rgba(224,90,74,0.25);}
.ms-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.ms-item:last-child{border-bottom:none;}
.ms-dot{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;}
.ms-dot.done{background:var(--green);border-color:var(--green);color:#fff;}
.ms-dot.inprog{background:var(--amber-bg);border-color:var(--amber);color:var(--amber);}
.ms-name{font-size:13px;font-weight:500;flex:1;}
.ms-date{font-size:11px;color:var(--text3);}
.report-item{padding:12px 0;border-bottom:1px solid var(--border);}
.report-item:last-child{border-bottom:none;}
.report-date{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:4px;}
.report-work{font-size:13px;color:var(--text);line-height:1.55;margin-bottom:6px;}
.report-workers{font-size:11px;color:var(--text3);}
.photos-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.photos-grid img{aspect-ratio:1;object-fit:cover;border-radius:8px;width:100%;cursor:pointer;}
.issue-item{padding:10px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.issue-item:last-child{border-bottom:none;}
.issue-title{font-size:13px;font-weight:500;}
.empty{text-align:center;padding:24px;color:var(--text3);font-size:13px;}
.loading{text-align:center;padding:32px;color:var(--text3);}
.pmodal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.93);z-index:9999;align-items:center;justify-content:center;}
.pmodal.show{display:flex;}
.pmodal img{max-width:92vw;max-height:88vh;border-radius:8px;}
.pmodal-close{position:absolute;top:16px;right:16px;font-size:26px;color:#fff;cursor:pointer;}
.footer{text-align:center;padding:24px 16px 0;font-size:11px;color:var(--text3);}
.footer a{color:var(--amber);text-decoration:none;}
@media(max-width:380px){.metrics{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>

<div class="pmodal" id="pmodal" onclick="this.classList.remove('show')">
  <span class="pmodal-close">✕</span>
  <img id="pmodal-img" src="" alt=""/>
</div>

<nav class="nav">
  <div class="nav-logo">Build<span>watch</span></div>
  <span class="nav-badge">Client View</span>
</nav>

<div class="content" id="content">
  <div class="loading">Loading project...</div>
</div>

<div class="footer">
  Powered by <a href="https://buildwatch.info" target="_blank">Buildwatch</a> · Construction Site Management
</div>

<script>
const SB_URL='https://jmfmbmdedwyuoocatwzn.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImptZm1ibWRlZHd5dW9vY2F0d3puIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NTMzODksImV4cCI6MjA5NTEyOTM4OX0.V-CyVbb41q3w4ZdS7mKzyhG_9gCaG_7aam1X9JqFS5w';
const sb=supabase.createClient(SB_URL,SB_KEY);

function fmtDate(d){if(!d)return'—';return new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});}
function fmtNum(n){if(!n)return'0';if(n>=100000)return(n/100000).toFixed(1)+'L';if(n>=1000)return(n/1000).toFixed(1)+'K';return Number(n).toLocaleString('en-IN');}

async function init(){
  const params=new URLSearchParams(window.location.search);
  const projectName=params.get('p');

  if(!projectName){
    document.getElementById('content').innerHTML='<div class="loading">Invalid link. Please contact your contractor.</div>';
    return;
  }

  // Load all data in parallel
  const [pr,rr,mr,ir,ar]=await Promise.all([
    sb.from('projects').select('*').eq('name',projectName).eq('active',true).single(),
    sb.from('reports').select('*').eq('project',projectName).order('created_at',{ascending:false}).limit(10),
    sb.from('milestones').select('*').eq('project',projectName).order('created_at'),
    sb.from('issues').select('*').eq('project',projectName).eq('status','open').order('created_at',{ascending:false}),
    sb.from('attendance').select('date,worker_name').eq('project',projectName).order('date',{ascending:false}).limit(100)
  ]);

  const project=pr.data;
  const reports=rr.data||[];
  const milestones=mr.data||[];
  const issues=ir.data||[];
  const attendance=ar.data||[];

  if(!project){
    document.getElementById('content').innerHTML='<div class="loading">Project not found.</div>';
    return;
  }

  const pct=project.progress||0;
  const donems=milestones.filter(m=>m.status==='done').length;
  const allPhotos=reports.filter(r=>r.photos&&r.photos.length>0);
  const uniqueDates=[...new Set(attendance.map(a=>a.date))].length;

  // Build page
  let html=`
    <div class="project-hero">
      <div class="project-name">🏗 ${project.name}</div>
      <div class="project-meta">${project.location||''}${project.client_name?' · '+project.client_name:''}</div>
      <div class="progress-wrap">
        <div class="progress-label"><span>Overall Progress</span><span style="color:var(--amber);font-weight:700;">${pct}%</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
    </div>

    <div class="metrics">
      <div class="mc"><div class="mc-val">${reports.length}</div><div class="mc-label">Reports</div></div>
      <div class="mc"><div class="mc-val">${donems}/${milestones.length}</div><div class="mc-label">Milestones</div></div>
      <div class="mc"><div class="mc-val" style="color:${issues.length>0?'var(--red)':'var(--green)'};">${issues.length}</div><div class="mc-label">Open Issues</div></div>
    </div>`;

  // MILESTONES
  if(milestones.length>0){
    html+=`<div class="card"><div class="card-title"><span class="cdot"></span>Milestones</div>`;
    html+=milestones.map(m=>{
      const isDone=m.status==='done';
      const isIP=m.status==='in-progress';
      return `<div class="ms-item">
        <div class="ms-dot ${isDone?'done':isIP?'inprog':''}">${isDone?'✓':isIP?'◎':'○'}</div>
        <div class="ms-name" style="${isDone?'text-decoration:line-through;color:var(--text3);':''}">${m.name}</div>
        <div>
          <span class="tag ${isDone?'tag-ok':isIP?'tag-warn':'tag-bad'}">${isDone?'Done':isIP?'Active':'Pending'}</span>
          ${m.target_date?`<div class="ms-date" style="margin-top:3px;">${fmtDate(m.target_date)}</div>`:''}
        </div>
      </div>`;
    }).join('');
    html+=`</div>`;
  }

  // RECENT REPORTS
  if(reports.length>0){
    html+=`<div class="card"><div class="card-title"><span class="cdot"></span>Recent Updates</div>`;
    html+=reports.slice(0,5).map(r=>`
      <div class="report-item">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;">
          <div class="report-date">${fmtDate(r.date)}</div>
          <span class="tag ${r.issues?'tag-warn':'tag-ok'}">${r.issues?'Issue':'Clear'}</span>
        </div>
        <div class="report-work">${r.work_done}</div>
        <div class="report-workers">👷 ${r.workers} workers · ${r.supervisor}</div>
        ${r.materials?`<div style="font-size:11px;color:var(--text3);margin-top:3px;">📦 ${r.materials}</div>`:''}
        ${r.issues?`<div style="font-size:12px;color:var(--red);background:rgba(224,90,74,0.08);padding:6px 9px;border-radius:6px;margin-top:6px;border-left:3px solid var(--red);">⚠️ ${r.issues}</div>`:''}
      </div>`).join('');
    html+=`</div>`;
  }

  // PHOTO TIMELINE
  if(allPhotos.length>0){
    html+=`<div class="card"><div class="card-title"><span class="cdot"></span>Site Photos</div>`;
    allPhotos.slice(0,3).forEach(r=>{
      html+=`<div style="font-size:11px;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.07em;">${fmtDate(r.date)}</div>
      <div class="photos-grid" style="margin-bottom:12px;">
        ${r.photos.map(p=>`<img src="${p}" onclick="document.getElementById('pmodal-img').src='${p.replace(/'/g,"\\'")}';document.getElementById('pmodal').classList.add('show');"/>`).join('')}
      </div>`;
    });
    html+=`</div>`;
  }

  // OPEN ISSUES
  if(issues.length>0){
    html+=`<div class="card"><div class="card-title"><span class="cdot"></span>Open Issues (${issues.length})</div>`;
    html+=issues.map(i=>{
      const pc=i.priority==='high'?'tag-bad':i.priority==='medium'?'tag-warn':'tag-ok';
      return `<div class="issue-item"><div class="issue-title">${i.title}</div><span class="tag ${pc}">${i.priority}</span></div>`;
    }).join('');
    html+=`</div>`;
  } else {
    html+=`<div class="card" style="text-align:center;padding:20px;">
      <div style="font-size:24px;margin-bottom:8px;">✅</div>
      <div style="font-size:13px;color:var(--green);font-weight:600;">No open issues</div>
    </div>`;
  }

  document.getElementById('content').innerHTML=html;
}

init();
</script>
</body>
</html>
