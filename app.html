<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Buildwatch — Jyoti Garden House</title>

<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#F5A623">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Buildwatch">
<meta name="application-name" content="Buildwatch">
<meta name="msapplication-TileColor" content="#0E0D0A">

<!-- Icons -->
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<link rel="apple-touch-icon" href="/icon-192.png">

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0E0D0A;--surface:#1A1916;--surface2:#242220;--border:#2E2C28;--border2:#3A3835;
  --text:#F0EDE6;--text2:#9B9890;--text3:#6B6860;
  --amber:#F5A623;--amber-bg:rgba(245,166,35,0.08);--amber-border:rgba(245,166,35,0.2);
  --green:#2DB87A;--green-bg:rgba(45,184,122,0.08);
  --red:#E05A4A;--red-bg:rgba(224,90,74,0.08);
  --blue:#4A9EE0;--blue-bg:rgba(74,158,224,0.08);
  --purple:#9B7AE0;--purple-bg:rgba(155,122,224,0.08);
  --radius:12px;
}
html{-webkit-font-smoothing:antialiased}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}

/* LOGIN */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-box{width:100%;max-width:380px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:36px 28px;}
.logo-wrap{display:flex;align-items:center;gap:10px;margin-bottom:28px;}
.logo-icon{width:40px;height:40px;background:#111009;border-radius:10px;border:1px solid var(--amber-border);display:flex;align-items:center;justify-content:center;}
.logo-icon svg{width:22px;height:22px;}
.logo-text{font-size:20px;font-weight:700;letter-spacing:-0.5px;}
.logo-text span{color:var(--amber);}
.login-title{font-size:18px;font-weight:600;margin-bottom:4px;}
.login-sub{font-size:12px;color:var(--text2);margin-bottom:24px;line-height:1.5;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;font-weight:600;color:var(--text3);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.07em;}
.field input,.field select,.field textarea{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:11px 13px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--amber);}
.field input::placeholder,.field textarea::placeholder{color:var(--text3);}
.field select option{background:var(--surface);}
.field textarea{resize:vertical;min-height:75px;}
.btn{padding:12px 20px;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px;}
.btn-full{width:100%;}
.btn-primary{background:var(--amber);color:#0E0D0A;}
.btn-primary:hover{background:#f0aa28;}
.btn-primary:disabled{opacity:0.55;cursor:not-allowed;}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border2);}
.btn-secondary:hover{border-color:var(--amber);color:var(--amber);}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid rgba(224,90,74,0.25);}
.btn-sm{padding:7px 14px;font-size:12px;}
.err{font-size:12px;color:var(--red);margin-top:6px;display:none;}

/* APP */
#app{display:none;flex-direction:column;min-height:100vh;}
.nav{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);padding:0 18px;height:54px;display:flex;align-items:center;justify-content:space-between;}
.nav-left{display:flex;align-items:center;gap:10px;}
.nav-logo{font-weight:700;font-size:15px;display:flex;align-items:center;gap:8px;}
.nav-logo-icon{width:28px;height:28px;background:#111009;border-radius:6px;border:1px solid var(--amber-border);display:flex;align-items:center;justify-content:center;}
.nav-logo-icon svg{width:14px;height:14px;}
.nav-logo span{color:var(--amber);}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.nav-right{display:flex;align-items:center;gap:8px;}
.role-badge{font-size:10px;font-weight:600;padding:3px 9px;border-radius:100px;text-transform:uppercase;letter-spacing:0.06em;}
.role-contractor{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border);}
.role-supervisor{background:var(--blue-bg);color:var(--blue);border:1px solid rgba(74,158,224,0.25);}
.role-store{background:var(--green-bg);color:var(--green);border:1px solid rgba(45,184,122,0.25);}
.role-accountant{background:var(--purple-bg);color:var(--purple);border:1px solid rgba(155,122,224,0.25);}
.role-client{background:var(--surface2);color:var(--text2);border:1px solid var(--border2);}
.nav-name{font-size:12px;color:var(--text2);}
.logout-btn{font-size:11px;color:var(--text3);cursor:pointer;padding:4px 8px;border-radius:6px;}
.logout-btn:hover{color:var(--red);}

.proj-header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 18px;}
.proj-name{font-size:16px;font-weight:700;letter-spacing:-0.3px;}
.proj-meta{font-size:11px;color:var(--text2);margin-top:1px;}

/* TABS */
.tabs{display:flex;overflow-x:auto;background:var(--surface);border-bottom:1px solid var(--border);padding:0 18px;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:13px 15px;font-size:12px;font-weight:500;color:var(--text3);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s;}
.tab.active{color:var(--amber);border-bottom-color:var(--amber);}
.tab:hover:not(.active){color:var(--text2);}

/* CONTENT */
.content{padding:18px;max-width:780px;margin:0 auto;width:100%;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px;}
.card-title{font-size:13px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px;color:var(--text);}
.card-title .cdot{width:5px;height:5px;border-radius:50%;background:var(--amber);}

/* METRICS */
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.mc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;}
.mc-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:5px;}
.mc-val{font-size:24px;font-weight:700;letter-spacing:-0.5px;line-height:1;}
.mc-sub{font-size:10px;color:var(--text3);margin-top:3px;}
.mc.amber .mc-val{color:var(--amber);}
.mc.green .mc-val{color:var(--green);}
.mc.red .mc-val{color:var(--red);}
.mc.blue .mc-val{color:var(--blue);}

/* LIST ITEMS */
.list-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:8px;}
.li-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.li-title{font-size:13px;font-weight:600;}
.li-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.li-body{font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:6px;}
.li-issue{font-size:12px;color:var(--red);background:var(--red-bg);padding:7px 9px;border-radius:6px;margin-bottom:6px;}
.photos-row{display:flex;gap:6px;flex-wrap:wrap;}
.photo-thumb{width:60px;height:60px;object-fit:cover;border-radius:6px;border:1px solid var(--border);cursor:pointer;}

/* FINANCE */
.fi-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--border);}
.fi-row:last-child{border-bottom:none;}
.fi-left .fi-type{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;}
.fi-left .fi-desc{font-size:13px;font-weight:500;margin-top:1px;}
.fi-left .fi-meta{font-size:11px;color:var(--text3);margin-top:1px;}
.fi-amt{font-size:15px;font-weight:700;color:var(--red);}

/* TAGS */
.tag{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:100px;text-transform:uppercase;letter-spacing:0.04em;}
.tag-ok{background:var(--green-bg);color:var(--green);}
.tag-warn{background:var(--amber-bg);color:var(--amber);}
.tag-bad{background:var(--red-bg);color:var(--red);}

/* FORM */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-actions{display:flex;gap:8px;margin-top:16px;}
.sec-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px;}

/* UPLOAD */
.upload-area{border:2px dashed var(--border2);border-radius:10px;padding:18px;text-align:center;cursor:pointer;transition:border-color .2s;}
.upload-area:hover{border-color:var(--amber);}
.upload-area input{display:none;}
.preview-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}

/* ALERT */
.alert{background:var(--red-bg);border:1px solid rgba(224,90,74,0.2);border-radius:10px;padding:11px 14px;margin-bottom:14px;font-size:12px;color:var(--red);display:flex;align-items:center;gap:8px;}

/* TEAM */
.team-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.team-info .tm-name{font-size:14px;font-weight:600;}
.team-info .tm-role{font-size:11px;color:var(--text3);margin-top:2px;}
.team-info .tm-pass{font-size:11px;color:var(--text3);margin-top:2px;font-family:monospace;}

/* EMPTY/LOADING */
.empty{text-align:center;padding:36px 16px;color:var(--text3);}
.empty-icon{font-size:36px;margin-bottom:10px;}
.empty-text{font-size:13px;}
.loading{text-align:center;padding:36px;color:var(--text3);font-size:13px;}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--green);color:#fff;padding:10px 22px;border-radius:100px;font-size:13px;font-weight:600;transition:transform .3s;z-index:9999;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.err{background:var(--red);}

/* PHOTO MODAL */
.pmodal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:9999;align-items:center;justify-content:center;}
.pmodal.show{display:flex;}
.pmodal img{max-width:90vw;max-height:90vh;border-radius:8px;}
.pmodal-close{position:absolute;top:18px;right:18px;font-size:26px;color:#fff;cursor:pointer;}

/* ACCESS DENIED */
.denied{text-align:center;padding:60px 20px;}
.denied-icon{font-size:48px;margin-bottom:16px;}
.denied-title{font-size:18px;font-weight:600;margin-bottom:8px;}
.denied-text{font-size:13px;color:var(--text2);}

@media(max-width:480px){
  .metrics{grid-template-columns:1fr 1fr;}
  .form-row{grid-template-columns:1fr;}
  .login-box{padding:26px 18px;}
}
</style>
</head>
<body>

<div class="pmodal" id="pmodal" onclick="closePM()">
  <span class="pmodal-close">✕</span>
  <img id="pmodal-img" src="" alt=""/>
</div>
<div class="toast" id="toast"></div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="logo-wrap">
      <div class="logo-icon">
        <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="12" width="4" height="7" rx="0.75" fill="#F5A623"/>
          <rect x="8" y="7" width="4" height="12" rx="0.75" fill="#F5A623"/>
          <rect x="14" y="2" width="4" height="17" rx="0.75" fill="#F5A623"/>
        </svg>
      </div>
      <div class="logo-text">Build<span>watch</span></div>
    </div>
    <div class="login-title">Sign in</div>
    <div class="login-sub">Jyoti Garden House · KTech Buildcon Pvt Ltd</div>
    <div class="field">
      <label>Your Name</label>
      <input type="text" id="ln" placeholder="Enter your name"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="lp" placeholder="Enter your password" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <div class="err" id="lerr">Incorrect password. Try again.</div>
    <br/>
    <button class="btn btn-primary btn-full" id="lbtn" onclick="doLogin()">Sign In →</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <nav class="nav">
    <div class="nav-left">
      <div class="nav-logo">
        <div class="nav-logo-icon">
          <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="12" width="4" height="7" rx="0.75" fill="#F5A623"/>
            <rect x="8" y="7" width="4" height="12" rx="0.75" fill="#F5A623"/>
            <rect x="14" y="2" width="4" height="17" rx="0.75" fill="#F5A623"/>
          </svg>
        </div>
        Build<span>watch</span>
      </div>
      <div class="live-dot"></div>
    </div>
    <div class="nav-right">
      <span class="role-badge" id="nav-badge">—</span>
      <span class="nav-name" id="nav-name"></span>
      <span class="logout-btn" onclick="doLogout()">Logout</span>
    </div>
  </nav>

  <div class="proj-header">
    <div class="proj-name">Jyoti Garden House</div>
    <div class="proj-meta">KTech Buildcon Pvt Ltd · Contractor: Ram Dhan</div>
  </div>

  <div class="tabs" id="tabs-bar"></div>

  <!-- VIEWS -->
  <div id="view-dashboard" class="content" style="display:none;"></div>
  <div id="view-report" class="content" style="display:none;"></div>
  <div id="view-reports" class="content" style="display:none;"></div>
  <div id="view-finance" class="content" style="display:none;"></div>
  <div id="view-materials" class="content" style="display:none;"></div>
  <div id="view-labour" class="content" style="display:none;"></div>
  <div id="view-team" class="content" style="display:none;"></div>
</div>

<script>
const SB_URL = 'https://jmfmbmdedwyuoocatwzn.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImptZm1ibWRlZHd5dW9vY2F0d3puIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NTMzODksImV4cCI6MjA5NTEyOTM4OX0.V-CyVbb41q3w4ZdS7mKzyhG_9gCaG_7aam1X9JqFS5w';
const sb = supabase.createClient(SB_URL, SB_KEY);
const PROJECT = 'Jyoti Garden House';

let CU = null; // current user object from DB
let photoFiles = [];

// ── ROLE CONFIG ──
const ROLE_CONFIG = {
  contractor:  { label:'Contractor',    badge:'role-contractor', tabs:['dashboard','report','reports','finance','materials','labour','team'] },
  supervisor:  { label:'Supervisor',    badge:'role-supervisor', tabs:['report','reports'] },
  store:       { label:'Store Manager', badge:'role-store',      tabs:['materials'] },
  accountant:  { label:'Accountant',    badge:'role-accountant', tabs:['finance','labour'] },
  client:      { label:'Client',        badge:'role-client',     tabs:['reports'] },
};

const TAB_LABELS = {
  dashboard:'Dashboard', report:'Daily Report', reports:'All Reports',
  finance:'Finance', materials:'Materials', labour:'Labour', team:'Team'
};

// ── LOGIN ──
async function doLogin() {
  const name = document.getElementById('ln').value.trim();
  const pass = document.getElementById('lp').value;
  const err  = document.getElementById('lerr');
  const btn  = document.getElementById('lbtn');
  err.style.display = 'none';
  if (!name || !pass) { err.textContent='Fill in your name and password.'; err.style.display='block'; return; }

  btn.textContent = 'Signing in...'; btn.disabled = true;

  const { data, error } = await sb.from('users')
    .select('*')
    .eq('project', PROJECT)
    .eq('active', true)
    .ilike('name', name)
    .eq('password', pass)
    .single();

  btn.textContent = 'Sign In →'; btn.disabled = false;

  if (error || !data) {
    err.textContent = 'Incorrect name or password. Try again.';
    err.style.display = 'block';
    return;
  }

  CU = data;
  localStorage.setItem('bw_user', JSON.stringify(CU));
  showApp();
}

function doLogout() {
  localStorage.removeItem('bw_user');
  CU = null;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

// ── SHOW APP ──
function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('app').style.flexDirection = 'column';

  const rc = ROLE_CONFIG[CU.role] || ROLE_CONFIG.supervisor;
  document.getElementById('nav-name').textContent = CU.name;
  document.getElementById('nav-badge').textContent = rc.label;
  document.getElementById('nav-badge').className = 'role-badge ' + rc.badge;

  // Build tabs
  const tabsBar = document.getElementById('tabs-bar');
  tabsBar.innerHTML = rc.tabs.map(t =>
    `<div class="tab" id="tab-${t}" onclick="switchTab('${t}')">${TAB_LABELS[t]}</div>`
  ).join('');

  // Set today on all date inputs
  const today = new Date().toISOString().split('T')[0];

  // Build views
  buildViews(today);

  // Show first tab
  switchTab(rc.tabs[0]);
}

// ── BUILD VIEWS ──
function buildViews(today) {
  const role = CU.role;

  // DASHBOARD
  document.getElementById('view-dashboard').innerHTML = `
    <div id="dash-alert" class="alert" style="display:none;">🚨 <span id="dash-alert-txt"></span></div>
    <div class="sec-label">Overview</div>
    <div class="metrics">
      <div class="mc amber"><div class="mc-label">Reports</div><div class="mc-val" id="m-rep">—</div><div class="mc-sub">Total</div></div>
      <div class="mc red"><div class="mc-label">Total Spent</div><div class="mc-val" id="m-spent">—</div><div class="mc-sub">All time</div></div>
      <div class="mc green"><div class="mc-label">Workers</div><div class="mc-val" id="m-wrk">—</div><div class="mc-sub">Last report</div></div>
    </div>
    <div class="card"><div class="card-title"><span class="cdot"></span>Latest Site Report</div><div id="d-rep"></div></div>
    <div class="card"><div class="card-title"><span class="cdot"></span>Recent Expenses</div><div id="d-fin"></div></div>
  `;

  // REPORT FORM
  document.getElementById('view-report').innerHTML = `
    <div class="card">
      <div class="card-title"><span class="cdot"></span>Submit Daily Report</div>
      <div class="form-row">
        <div class="field"><label>Date</label><input type="date" id="r-date" value="${today}"/></div>
        <div class="field"><label>Workers Present</label><input type="number" id="r-wrk" placeholder="e.g. 24" min="0"/></div>
      </div>
      <div class="field"><label>Work Done Today</label><textarea id="r-work" placeholder="Describe work completed today..."></textarea></div>
      <div class="field"><label>Materials Received</label><input type="text" id="r-mat" placeholder="e.g. 30 bags cement, 2 ton steel"/></div>
      <div class="field"><label>Issues / Problems</label><input type="text" id="r-issues" placeholder="Leave blank if no issues"/></div>
      <div class="field">
        <label>Site Photos</label>
        <div class="upload-area" onclick="document.getElementById('photo-inp').click()">
          <div style="font-size:26px;margin-bottom:5px;">📷</div>
          <div style="font-size:12px;color:var(--text2);">Tap to upload site photos</div>
          <input type="file" id="photo-inp" multiple accept="image/*" onchange="handlePhotos(this)"/>
        </div>
        <div class="preview-row" id="photo-prev"></div>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" id="r-btn" onclick="submitReport()">Submit Report ✓</button>
      </div>
    </div>
  `;

  // ALL REPORTS
  document.getElementById('view-reports').innerHTML = `
    <div class="sec-label">All Site Reports</div>
    <div id="rep-list"><div class="loading">Loading...</div></div>
  `;

  // FINANCE
  document.getElementById('view-finance').innerHTML = `
    <div class="card">
      <div class="card-title"><span class="cdot"></span>Add Expense</div>
      <div class="form-row">
        <div class="field"><label>Date</label><input type="date" id="f-date" value="${today}"/></div>
        <div class="field"><label>Type</label>
          <select id="f-type">
            <option>Material</option><option>Labour Payment</option>
            <option>Vendor</option><option>Equipment</option><option>Other</option>
          </select>
        </div>
      </div>
      <div class="field"><label>Description</label><input type="text" id="f-desc" placeholder="e.g. 50 cement bags from Sharma Traders"/></div>
      <div class="form-row">
        <div class="field"><label>Amount (₹)</label><input type="number" id="f-amt" placeholder="0"/></div>
        <div class="field"><label>Payment Mode</label>
          <select id="f-mode"><option>Cash</option><option>UPI</option><option>Bank Transfer</option><option>Cheque</option></select>
        </div>
      </div>

// ── TABS ──
function switchTab(tab) {
  const rc = ROLE_CONFIG[CU.role];
  if (!rc.tabs.includes(tab)) return;

  rc.tabs.forEach(t => {
    document.getElementById('view-'+t).style.display = t === tab ? 'block' : 'none';
    const el = document.getElementById('tab-'+t);
    if (el) el.classList.toggle('active', t === tab);
  });

  if (tab === 'dashboard') loadDashboard();
  if (tab === 'reports')   loadReports();
  if (tab === 'finance')   loadFinance();
  if (tab === 'materials') loadMaterials();
  if (tab === 'labour')    loadLabour();
  if (tab === 'team')      loadTeam();
}

// ── PHOTOS ──
function handlePhotos(input) {
  const prev = document.getElementById('photo-prev');
  photoFiles = Array.from(input.files);
  prev.innerHTML = '';
  photoFiles.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = document.createElement('img');
      img.src = e.target.result;
      img.className = 'photo-thumb';
      img.onclick = () => openPM(e.target.result);
      prev.appendChild(img);
    };
    reader.readAsDataURL(file);
  });
}
function openPM(src) { document.getElementById('pmodal-img').src = src; document.getElementById('pmodal').classList.add('show'); }
function closePM() { document.getElementById('pmodal').classList.remove('show'); }

// ── SUBMIT REPORT ──
async function submitReport() {
  const btn = document.getElementById('r-btn');
  const wrk = document.getElementById('r-wrk').value;
  const work = document.getElementById('r-work').value.trim();
  if (!wrk || !work) { showToast('Fill workers count and work done', true); return; }
  btn.textContent = 'Saving...'; btn.disabled = true;

  const photos = [];
  for (const file of photoFiles) {
    const b64 = await new Promise(res => { const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(file); });
    photos.push(b64);
  }

  const { error } = await sb.from('reports').insert({
    date: document.getElementById('r-date').value,
    supervisor: CU.name,
    workers: parseInt(wrk),
    work_done: work,
    materials: document.getElementById('r-mat').value,
    issues: document.getElementById('r-issues').value,
    photos,
    project: PROJECT
  });

  btn.textContent = 'Submit Report ✓'; btn.disabled = false;
  if (error) { showToast('Error: '+error.message, true); return; }
  ['r-wrk','r-work','r-mat','r-issues'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('photo-prev').innerHTML = '';
  photoFiles = [];
  showToast('Report submitted ✓');
  switchTab(ROLE_CONFIG[CU.role].tabs[0]);
}

async function loadDashboard() {

    sb.from('finance').select('*').eq('project',PROJECT).order('created_at',{ascending:false})
  ]);

  const total = finance.reduce((s,f)=>s+f.amount,0);

  document.getElementById('m-rep').textContent   = reports.length;
  document.getElementById('m-spent').textContent = '₹'+fmtNum(total);
  document.getElementById('m-wrk').textContent   = reports.length>0 ? reports[0].workers : '—';

  if (reports.length>0 && reports[0].issues) {
    document.getElementById('dash-alert').style.display='flex';
    document.getElementById('dash-alert-txt').textContent='Issue flagged: '+reports[0].issues;
  }

  const dRep = document.getElementById('d-rep');
  if (reports.length>0) {
    const r=reports[0];
    dRep.innerHTML=`
      <div style="margin-bottom:8px;">
        <span style="font-size:13px;font-weight:600;">${fmtDate(r.date)}</span>
        <span class="tag ${r.issues?'tag-warn':'tag-ok'}" style="margin-left:8px;">${r.issues?'Issue':'Clear'}</span>
      </div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:6px;line-height:1.5;">${r.work_done}</div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:6px;">👷 ${r.workers} workers · ${r.supervisor}</div>
      ${r.materials?`<div style="font-size:11px;color:var(--text3);margin-bottom:6px;">📦 ${r.materials}</div>`:''}
      ${r.issues?`<div class="li-issue">⚠️ ${r.issues}</div>`:''}
      ${r.photos&&r.photos.length>0?`<div class="photos-row">${r.photos.map(p=>`<img src="${p}" class="photo-thumb" onclick="openPM('${p.replace(/'/g,"\\'")}')"/>`).join('')}</div>`:''}
    `;
  } else {
    dRep.innerHTML='<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">No reports yet.</div></div>';
  }

  const dFin = document.getElementById('d-fin');
  if (finance.length>0) {
    dFin.innerHTML=finance.slice(0,3).map(f=>`
      <div class="fi-row">
        <div class="fi-left"><div class="fi-type">${f.type}</div><div class="fi-desc">${f.description}</div><div class="fi-meta">${fmtDate(f.date)} · ${f.payment_mode}</div></div>
        <div class="fi-amt">-₹${fmtNum(f.amount)}</div>
      </div>`).join('');
  } else {
    dFin.innerHTML='<div class="empty"><div class="empty-icon">💰</div><div class="empty-text">No finance entries yet.</div></div>';
  }
}

// ── UTILS ──
function fmtNum(n) {
  if (!n) return '0';
  if (n>=100000) return (n/100000).toFixed(1)+'L';
  if (n>=1000)   return (n/1000).toFixed(1)+'K';
  return Number(n).toLocaleString('en-IN');
}
function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
}
function showToast(msg,isErr=false) {
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast'+(isErr?' err':'');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

// ── INSTALL PROMPT ──
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  showInstallBanner();
});

function showInstallBanner() {
  const banner = document.createElement('div');
  banner.id = 'install-banner';
  banner.style.cssText = `
    position:fixed;bottom:0;left:0;right:0;
    background:#1A1916;border-top:1px solid rgba(245,166,35,0.3);
    padding:14px 18px;display:flex;align-items:center;
    justify-content:space-between;z-index:9998;
  `;
  banner.innerHTML = `
    <div>
      <div style="font-size:13px;font-weight:600;color:#F0EDE6;">Install Buildwatch App</div>
      <div style="font-size:11px;color:#9B9890;margin-top:2px;">Add to home screen for quick access</div>
    </div>
    <div style="display:flex;gap:8px;">
      <button onclick="document.getElementById('install-banner').remove()" 
        style="padding:8px 14px;border:1px solid #3A3835;background:transparent;color:#9B9890;border-radius:6px;font-size:12px;cursor:pointer;">
        Later
      </button>
      <button onclick="installApp()" 
        style="padding:8px 14px;background:#F5A623;color:#0E0D0A;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;">
        Install
      </button>
    </div>
  `;
  document.body.appendChild(banner);
}

async function installApp() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('install-banner')?.remove();
}

if (saved) { try { CU=JSON.parse(saved); showApp(); } catch(e){} }
